version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: chuhuai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Jschrj83130911!
      MYSQL_DATABASE: eggy_note
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_general_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: chuhuai-note
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: Jschrj83130911!
      MYSQL_DB: eggy_note
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
